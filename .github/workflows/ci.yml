name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  smoke-check:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Compile source files
        run: python -m compileall src

      - name: Import core modules
        run: |
          python - <<'PY'
          import sys
          from pathlib import Path
          sys.path.insert(0, str(Path("src").resolve()))
          import run_pipeline  # noqa: F401
          import run_service  # noqa: F401
          import app_launcher  # noqa: F401
          print("Core module imports succeeded.")
          PY

      - name: Validate JSON config and example files
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          for path in list(Path("config").glob("*.json")) + list(Path("examples").glob("*.json")):
              with path.open("r", encoding="utf-8") as fh:
                  json.load(fh)
              print(f"Validated {path}")
          PY
